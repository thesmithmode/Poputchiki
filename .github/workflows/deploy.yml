name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  REPO: thesmithmode/poputchiki

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: api
            context: .
            dockerfile: apps/api/Dockerfile
          - service: notifier
            context: .
            dockerfile: apps/notifier/Dockerfile
          - service: cron
            context: .
            dockerfile: apps/cron/Dockerfile
          - service: webhook
            context: .
            dockerfile: apps/webhook/Dockerfile
          - service: web
            context: .
            dockerfile: apps/web-server/Dockerfile
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}-${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.REPO }}-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_BASE=https://api.${{ vars.DOMAIN }}
            DOMAIN=${{ vars.DOMAIN }}

  trivy-scan:
    needs: build-and-push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, notifier, cron, webhook, web]
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy scan ${{ matrix.service }}
        uses: aquasecurity/trivy-action@0.31.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.REPO }}-${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore

  deploy:
    needs: [build-and-push, trivy-scan]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Create directories on server
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "mkdir -p /opt/poputchiki/infra/postgres/init \
                      /opt/poputchiki/infra/promtail \
                      /opt/poputchiki/infra/loki \
                      /opt/poputchiki/infra/grafana/provisioning/datasources \
                      /opt/poputchiki/infra/prometheus \
                      /opt/poputchiki/scripts \
                      /opt/poputchiki/logs \
                      /opt/poputchiki/backups \
                      /opt/poputchiki/letsencrypt && \
             chmod 700 /opt/poputchiki/letsencrypt"

      - name: Generate .env on server
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cat > /opt/poputchiki/.env << 'EOF'
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          APP_DB_PASSWORD=${{ secrets.APP_DB_PASSWORD }}
          SERVICE_DB_PASSWORD=
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          BOT_TOKEN=${{ secrets.BOT_TOKEN }}
          PGCRYPTO_KEY=${{ secrets.PGCRYPTO_KEY }}
          ADMIN_TG_ID=${{ secrets.ADMIN_TG_ID }}
          ADMIN_TG_CHAT_ID=${{ secrets.ADMIN_TG_CHAT_ID }}
          METRICS_TOKEN=
          DOMAIN=${{ vars.DOMAIN }}
          BACKUP_KEY=${{ secrets.BACKUP_KEY }}
          WEBHOOK_SECRET=${{ secrets.WEBHOOK_SECRET }}
          ACME_EMAIL=${{ secrets.ACME_EMAIL }}
          CF_DNS_API_TOKEN=${{ secrets.CF_DNS_API_TOKEN }}
          DATABASE_URL=postgres://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/${{ secrets.POSTGRES_DB }}
          EOF
          chmod 600 /opt/poputchiki/.env"

      - name: GHCR login on server
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "docker login ghcr.io -u ${{ github.actor }} --password-stdin"

      - name: Copy scripts to server
        run: |
          scp -r infra scripts ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/poputchiki/

      - name: Deploy
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd /opt/poputchiki && bash scripts/deploy.sh ${{ github.sha }}"
        env:
          SHA: ${{ github.sha }}

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Smoke test API
        run: |
          for i in 1 2 3; do
            if curl -sf "https://api.${{ vars.DOMAIN }}/health"; then
              echo "API health OK"
              break
            fi
            if [[ $i -eq 3 ]]; then
              echo "API health failed after 3 attempts" >&2
              exit 1
            fi
            sleep 5
          done

      - name: Smoke test Web
        run: |
          for i in 1 2 3; do
            if curl -sf "https://app.${{ vars.DOMAIN }}/"; then
              echo "Web OK"
              break
            fi
            if [[ $i -eq 3 ]]; then
              echo "Web health failed after 3 attempts" >&2
              exit 1
            fi
            sleep 5
          done

  rollback-on-fail:
    needs: [deploy, smoke]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Rollback
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd /opt/poputchiki && bash scripts/rollback.sh"

      - name: Alert admin
        run: |
          curl -sS --max-time 10 -X POST \
            "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.ADMIN_TG_CHAT_ID }}" \
            --data-urlencode "text=🚨 Deploy ${{ github.sha }} FAILED — rollback executed" \
            || true
