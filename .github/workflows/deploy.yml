name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  REPO: thesmithmode/poputchiki

jobs:
  # CICD-01: гейт перед деплоем — проверяем что для этого SHA был зелёный CI.
  # CI триггерится на push в dev (branches-ignore: [main]). Squash merge dev→main
  # создаёт новый SHA; first-parent — предыдущий main tip (PR squash, тоже без CI).
  # Проверяем: текущий SHA → dev branch tip → последний зелёный CI run на dev.
  verify-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify CI green for this SHA or dev tip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SHA="${{ github.sha }}"
          check_sha() {
            local sha="$1"
            local conc
            conc=$(gh run list --workflow ci.yml --commit "$sha" --limit 1 --json conclusion --jq '.[0].conclusion' 2>/dev/null || echo "")
            [[ "$conc" == "success" ]]
          }
          if check_sha "$SHA"; then
            echo "CI success for $SHA"
            exit 0
          fi
          DEV_SHA=$(git rev-parse origin/dev 2>/dev/null || echo "")
          if [[ -n "$DEV_SHA" ]] && check_sha "$DEV_SHA"; then
            echo "CI success for dev tip $DEV_SHA (squash-merge SHA changed)"
            exit 0
          fi
          LATEST_DEV_CI=$(gh run list --workflow ci.yml --branch dev --status success --limit 1 --json headSha --jq '.[0].headSha' 2>/dev/null || echo "")
          if [[ -n "$LATEST_DEV_CI" ]]; then
            echo "CI success for latest green dev run $LATEST_DEV_CI (fallback)"
            exit 0
          fi
          echo "ERROR: no successful CI run for $SHA, dev tip $DEV_SHA, or any dev branch — refusing to deploy" >&2
          exit 1

  build-and-push:
    needs: verify-ci
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: api
            context: .
            dockerfile: apps/api/Dockerfile
          - service: notifier
            context: .
            dockerfile: apps/notifier/Dockerfile
          - service: cron
            context: .
            dockerfile: apps/cron/Dockerfile
          - service: webhook
            context: .
            dockerfile: apps/webhook/Dockerfile
          - service: web
            context: .
            dockerfile: apps/web-server/Dockerfile
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        run: |
          for i in 1 2 3; do
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin \
              && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}-${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.REPO }}-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_BASE=https://api.${{ vars.DOMAIN }}
            DOMAIN=${{ vars.DOMAIN }}

  trivy-scan:
    needs: build-and-push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, notifier, cron, webhook, web]
    steps:
      - uses: actions/checkout@v6

      - name: Pull image with retry
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.REPO }}-${{ matrix.service }}:${{ github.sha }}"
          for i in 1 2 3; do
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin \
              && docker pull "$IMAGE" \
              && docker tag "$IMAGE" "scan-target:${{ matrix.service }}" \
              && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done

      - name: Trivy scan ${{ matrix.service }}
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: scan-target:${{ matrix.service }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore

  deploy:
    needs: [build-and-push, trivy-scan]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Create directories on server
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "mkdir -p /opt/poputchiki/infra/postgres/init \
                      /opt/poputchiki/infra/promtail \
                      /opt/poputchiki/infra/loki \
                      /opt/poputchiki/infra/grafana/provisioning/datasources \
                      /opt/poputchiki/infra/prometheus \
                      /opt/poputchiki/scripts \
                      /opt/poputchiki/logs \
                      /opt/poputchiki/backups \
                      /opt/poputchiki/letsencrypt && \
             chmod 700 /opt/poputchiki/letsencrypt && \
             touch /opt/poputchiki/letsencrypt/acme.json && \
             chmod 600 /opt/poputchiki/letsencrypt/acme.json"

      # H5-NOTE: значения secrets передаются через pipe в SSH (GitHub маскирует их в логах).
      # Альтернатива: base64-кодированный PROD_ENV_FILE secret → scp без pipe.
      # Текущий подход безопасен при отсутствии SSH debug output (ssh -v не используется).
      - name: Generate .env on server
        run: |
          {
            echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}"
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"
            echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}"
            echo "APP_DB_PASSWORD=${{ secrets.APP_DB_PASSWORD }}"
            echo "SERVICE_DB_PASSWORD="
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
            echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}"
            echo "PGCRYPTO_KEY=${{ secrets.PGCRYPTO_KEY }}"
            echo "ADMIN_TG_ID=${{ secrets.ADMIN_TG_ID }}"
            echo "ADMIN_TG_CHAT_ID=${{ secrets.ADMIN_TG_CHAT_ID }}"
            echo "METRICS_TOKEN="
            echo "DOMAIN=${{ vars.DOMAIN }}"
            echo "BACKUP_KEY=${{ secrets.BACKUP_KEY }}"
            echo "WEBHOOK_SECRET=${{ secrets.WEBHOOK_SECRET }}"
            echo "INTERNAL_API_SECRET=${{ secrets.INTERNAL_API_SECRET }}"
            echo "ACME_EMAIL=${{ secrets.ACME_EMAIL }}"
            echo "CF_DNS_API_TOKEN=${{ secrets.CF_DNS_API_TOKEN }}"
            echo "DATABASE_URL=postgres://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/${{ secrets.POSTGRES_DB }}"
          } | ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cat > /opt/poputchiki/.env && chmod 600 /opt/poputchiki/.env"

      - name: GHCR login on server
        run: |
          for i in 1 2 3; do
            echo "${{ secrets.GITHUB_TOKEN }}" | \
            ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "docker login ghcr.io -u ${{ github.actor }} --password-stdin" \
              && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done

      - name: Copy scripts to server
        run: |
          scp -r infra scripts ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/poputchiki/

      - name: Setup daily backup cron (01:00 UTC = 04:00 MSK)
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            CRON_JOB='0 1 * * * cd /opt/poputchiki && bash scripts/backup-db.sh >> /opt/poputchiki/logs/backup.log 2>&1'
            ( crontab -l 2>/dev/null | grep -v 'backup-db.sh'; echo \"\$CRON_JOB\" ) | crontab -
          "

      - name: Deploy
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd /opt/poputchiki && bash scripts/deploy.sh ${{ github.sha }}"
        env:
          SHA: ${{ github.sha }}

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Smoke test API
        run: |
          for i in 1 2 3 4 5 6; do
            if curl -sf "https://api.${{ vars.DOMAIN }}/health"; then
              echo "API health OK"
              break
            fi
            if [[ $i -eq 6 ]]; then
              echo "API health failed after 6 attempts" >&2
              exit 1
            fi
            sleep 5
          done

      - name: Smoke test Web
        run: |
          for i in 1 2 3 4 5 6; do
            if curl -sf "https://app.${{ vars.DOMAIN }}/"; then
              echo "Web OK"
              break
            fi
            if [[ $i -eq 6 ]]; then
              echo "Web health failed after 6 attempts" >&2
              exit 1
            fi
            sleep 5
          done

  rollback-on-fail:
    needs: [deploy, smoke]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Rollback
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd /opt/poputchiki && bash scripts/rollback.sh"

      - name: Alert admin
        run: |
          curl -sS --max-time 10 -X POST \
            "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.ADMIN_TG_CHAT_ID }}" \
            --data-urlencode "text=🚨 Deploy ${{ github.sha }} FAILED — rollback executed" \
            || true
