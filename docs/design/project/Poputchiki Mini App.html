<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
  .leaflet-container { background: transparent; font-family: inherit; }
  .leaflet-control-attribution { font-size: 9px !important; padding: 1px 4px !important; }
  html, body { margin: 0; padding: 0; background: #ECEFF3; min-height: 100vh; font-family: -apple-system, "SF Pro Text", "Inter", "Segoe UI", Roboto, system-ui, sans-serif; color: #15191F; }
  body { display: flex; align-items: center; justify-content: center; padding: 32px 16px; box-sizing: border-box; }
  #root { display: flex; align-items: center; justify-content: center; }
  *::-webkit-scrollbar { width: 0; height: 0; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  input[type=range] { -webkit-appearance: none; height: 4px; border-radius: 4px; background: #E0E5EC; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.04); cursor: pointer; }
  input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
</style>
</head>

<div id="root"></div>
