services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./.docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - poputchiki-dev

  osrm-init:
    image: ghcr.io/project-osrm/osrm-backend:latest
    restart: "no"
    volumes:
      - ./.docker-data/osrm:/data
      - ../scripts/osrm-prepare.sh:/osrm-prepare.sh:ro
    entrypoint: ["/bin/sh", "/osrm-prepare.sh"]
    profiles:
      - osrm
    deploy:
      resources:
        limits:
          memory: 2g

  osrm:
    image: ghcr.io/project-osrm/osrm-backend:latest
    restart: unless-stopped
    command: osrm-routed --algorithm MLD /data/tatarstan.osrm
    volumes:
      - ./.docker-data/osrm:/data:ro
    ports:
      - "127.0.0.1:5000:5000"
    depends_on:
      osrm-init:
        condition: service_completed_successfully
    profiles:
      - osrm
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/nearest/v1/driving/49.1,55.8 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - poputchiki-dev
    deploy:
      resources:
        limits:
          memory: 512m

  nominatim:
    image: mediagis/nominatim:4.4
    restart: unless-stopped
    environment:
      PBF_URL: https://download.geofabrik.de/russia/volga-fed-district-latest.osm.pbf
      REPLICATION_URL: https://download.geofabrik.de/russia/volga-fed-district-updates/
      NOMINATIM_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "8080:8080"
    volumes:
      - ./.docker-data/nominatim:/var/lib/postgresql/14/main
    networks:
      - poputchiki-dev
    profiles:
      - nominatim

networks:
  poputchiki-dev:
    driver: bridge
    name: poputchiki-dev
