networks:
  traefik-public:
    driver: bridge
    name: traefik-public
  poputchiki-internal:
    driver: bridge
    name: poputchiki-internal

services:
  traefik:
    image: traefik:latest
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik-public"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--log.level=INFO"
      - "--api.dashboard=false"
    environment:
      CF_DNS_API_TOKEN: ${CF_DNS_API_TOKEN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/poputchiki/letsencrypt:/letsencrypt
    networks:
      - traefik-public
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "10"
    deploy:
      resources:
        limits:
          memory: 128m

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
      SERVICE_DB_PASSWORD: ${SERVICE_DB_PASSWORD:-}
    command: ["-c", "config_file=/etc/postgresql/postgresql.conf"]
    volumes:
      - /opt/poputchiki/postgres-data:/var/lib/postgresql/data
      - /opt/poputchiki/backups:/backups
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - poputchiki-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "10"
    deploy:
      resources:
        limits:
          memory: 1g

  migrations:
    image: ghcr.io/thesmithmode/poputchiki-api:${IMAGE_TAG:-latest}
    restart: "no"
    command: ["bun", "run", "db:migrate"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # H6: DATABASE_MIGRATOR_URL использует superuser т.к. некоторые миграции
      # требуют CREATE EXTENSION (pgcrypto) — невозможно без SUPERUSER.
      # poputchiki_migrator создан в 01-app-role.sql для будущего перехода
      # при отказе от CREATE EXTENSION в пользу preloaded extensions.
      DATABASE_MIGRATOR_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - poputchiki-internal
    profiles:
      - migrations

  # PgBouncer: transaction pooling перед postgres. Под 50k одновременных пользователей
  # api держит max=20 client connections, bouncer мультиплексирует их на ~25 server
  # connections к postgres. Spike трафика не убивает postgres connection limit.
  # LISTEN/NOTIFY НЕСОВМЕСТИМ с tx-pool — notifier/cron/api(SSE) идут на postgres:5432 напрямую.
  pgbouncer:
    image: edoburu/pgbouncer:v1.23.1-p3
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: poputchiki_app
      DB_PASSWORD: ${APP_DB_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 2000
      DEFAULT_POOL_SIZE: 25
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 3
      SERVER_RESET_QUERY: DISCARD ALL
      SERVER_IDLE_TIMEOUT: 60
      QUERY_WAIT_TIMEOUT: 30
      LISTEN_PORT: 6432
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - poputchiki-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 -U poputchiki_app || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 128m

  api:
    image: ghcr.io/thesmithmode/poputchiki-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      # Через PgBouncer (tx pool) — query traffic.
      DATABASE_URL: postgres://poputchiki_app:${APP_DB_PASSWORD}@pgbouncer:6432/${POSTGRES_DB}
      # Прямое соединение postgres для LISTEN/NOTIFY (SSE realtime).
      DATABASE_URL_DIRECT: postgres://poputchiki_app:${APP_DB_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      BOT_TOKEN: ${BOT_TOKEN}
      PGCRYPTO_KEY: ${PGCRYPTO_KEY}
      ADMIN_TG_ID: ${ADMIN_TG_ID}
      ADMIN_TG_CHAT_ID: ${ADMIN_TG_CHAT_ID}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
      DOMAIN: ${DOMAIN}
      NODE_ENV: production
      PORT: 3000
      # Shared secret для internal endpoints (используется webhook callback_query
      # handler для accept/reject заявок). Без него /internal/ride-requests не
      # регистрируется и кнопки "Принять"/"Отклонить" молча ломаются.
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      # Геокодер: self-hosted Nominatim в той же compose-сети. Дефолт переключён
      # на внутренний URL — после импорта PBF Татарстана (~15-30min при первом
      # старте) запросы пойдут локально. Override через .env при необходимости.
      NOMINATIM_URL: ${NOMINATIM_URL:-http://nominatim:8080}
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      nominatim:
        condition: service_started
    volumes:
      - /opt/poputchiki/logs:/app/logs
    networks:
      - traefik-public
      - poputchiki-internal
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.poputchiki-api.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.poputchiki-api.entrypoints=websecure"
      - "traefik.http.routers.poputchiki-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.poputchiki-api.loadbalancer.server.port=3000"
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "10"
    deploy:
      resources:
        limits:
          memory: 256m

  web:
    image: ghcr.io/thesmithmode/poputchiki-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    networks:
      - traefik-public
    environment:
      DOMAIN: ${DOMAIN}
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.poputchiki-web.rule=Host(`app.${DOMAIN}`)"
      - "traefik.http.routers.poputchiki-web.entrypoints=websecure"
      - "traefik.http.routers.poputchiki-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.poputchiki-web.loadbalancer.server.port=80"
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "10"
    deploy:
      resources:
        limits:
          memory: 256m

  notifier:
    image: ghcr.io/thesmithmode/poputchiki-notifier:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://poputchiki_app:${APP_DB_PASSWORD}@postgres:5432/${POSTGRES_DB}
      BOT_TOKEN: ${BOT_TOKEN}
      ADMIN_TG_CHAT_ID: ${ADMIN_TG_CHAT_ID}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - poputchiki-internal
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "10"
    deploy:
      resources:
        limits:
          memory: 256m

  cron:
    image: ghcr.io/thesmithmode/poputchiki-cron:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://poputchiki_app:${APP_DB_PASSWORD}@postgres:5432/${POSTGRES_DB}
      BOT_TOKEN: ${BOT_TOKEN}
      ADMIN_TG_CHAT_ID: ${ADMIN_TG_CHAT_ID}
      # H3-TODO: BACKUP_KEY в cron нарушает least privilege (cron имеет DATABASE_URL + ключ шифрования).
      # Переход: выделить отдельный backup-сервис без DATABASE_URL, cron без BACKUP_KEY.
      # Пока cron единственный агент с backup.ts — переход при рефакторинге apps/cron.
      BACKUP_KEY: ${BACKUP_KEY}
      BACKUP_DIR: /backups
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /opt/poputchiki/backups:/backups
      - /opt/poputchiki/logs:/app/logs
    networks:
      - poputchiki-internal
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "10"
    deploy:
      resources:
        limits:
          memory: 256m

  webhook:
    image: ghcr.io/thesmithmode/poputchiki-webhook:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://poputchiki_app:${APP_DB_PASSWORD}@postgres:5432/${POSTGRES_DB}
      BOT_TOKEN: ${BOT_TOKEN}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      WEBHOOK_PORT: 3001
      # Inline-кнопки Принять/Отклонить в боте делают POST на api-внутренний
      # endpoint /internal/ride-requests. Без API_URL+INTERNAL_API_SECRET callback
      # handler silently skipped (см. apps/webhook/src/app.ts:38).
      API_URL: http://api:3000
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      DOMAIN: ${DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - traefik-public
      - poputchiki-internal
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.poputchiki-webhook.rule=Host(`webhook.${DOMAIN}`)"
      - "traefik.http.routers.poputchiki-webhook.entrypoints=websecure"
      - "traefik.http.routers.poputchiki-webhook.tls.certresolver=letsencrypt"
      - "traefik.http.services.poputchiki-webhook.loadbalancer.server.port=3001"
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "10"
    deploy:
      resources:
        limits:
          memory: 256m

  nominatim:
    image: mediagis/nominatim:4.4
    restart: unless-stopped
    environment:
      # Geofabrik блокирует прямую загрузку PBF России (302 → root, требует OSM login
      # на osm-internal). Используем openstreetmap.fr (зеркало без auth, обновляется ежедневно).
      PBF_URL: https://download.openstreetmap.fr/extracts/russia/volga_federal_district/tatarstan_republic-latest.osm.pbf
      # Replication отключён — у openstreetmap.fr нет совместимого update-формата;
      # для MVP допустимо стейл-данные раз в месяц, обновляем через пере-импорт по cron.
      REPLICATION_URL: ""
      NOMINATIM_PASSWORD: ${POSTGRES_PASSWORD}
      IMPORT_STYLE: address
    volumes:
      - /opt/poputchiki/nominatim-data:/var/lib/postgresql/14/main
    networks:
      - poputchiki-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/status?format=json || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 30m
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "10"
    deploy:
      resources:
        limits:
          # M2: во время первого PBF-импорта (~30 мин) Nominatim потребляет >2GB.
          # 4g — безопасный предел; после импорта потребление падает до ~400MB.
          # При OOM: wipe nominatim-data volume → fresh import при следующем up.
          memory: 4g

  # OSM tile caching proxy: nginx CacheFirst, 2GB disk, 30 дней.
  # Роут: app.DOMAIN/tiles/* → этот сервис (Traefik PathPrefix priority=100).
  # Traefik сам снимает /tiles prefix перед форвардом (stripprefix middleware).
  # Новый DNS-запись НЕ нужна — тот же app.DOMAIN, тот же TLS-сертификат.
  tiles-proxy:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx-tiles.conf:/etc/nginx/conf.d/default.conf:ro
      - osm-tiles-cache:/var/cache/nginx/tiles
    networks:
      - traefik-public
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.tiles-proxy.rule=Host(`app.${DOMAIN}`) && PathPrefix(`/tiles`)"
      - "traefik.http.routers.tiles-proxy.entrypoints=websecure"
      - "traefik.http.routers.tiles-proxy.tls.certresolver=letsencrypt"
      - "traefik.http.routers.tiles-proxy.priority=100"
      - "traefik.http.middlewares.tiles-strip.stripprefix.prefixes=/tiles"
      - "traefik.http.routers.tiles-proxy.middlewares=tiles-strip"
      - "traefik.http.services.tiles-proxy.loadbalancer.server.port=80"
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 256m

volumes:
  osm-tiles-cache:
