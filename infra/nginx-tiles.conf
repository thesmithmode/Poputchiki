proxy_cache_path /var/cache/nginx/tiles
    levels=1:2
    keys_zone=osm_tiles:10m
    max_size=2g
    inactive=30d
    use_temp_path=off;

server {
    listen 80;

    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
    resolver_timeout 5s;

    # /{s}/{z}/{x}/{y}.png  — s ∈ {a,b,c}, proxy to matching OSM subdomain
    location ~ ^/([abc])/(\d+)/(\d+)/(\d+)\.png$ {
        set $osm_host "$1.tile.openstreetmap.org";

        proxy_pass https://$osm_host/$2/$3/$4.png;
        proxy_ssl_server_name on;

        # Cache key: z/x/y only — same tile regardless of which subdomain was used
        proxy_cache          osm_tiles;
        proxy_cache_key      "$2/$3/$4";
        proxy_cache_valid    200 30d;
        proxy_cache_valid    any 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock     on;
        proxy_cache_lock_timeout 5s;

        proxy_set_header Host       $osm_host;
        proxy_set_header User-Agent "PoputchikiApp/1.0 (https://app.poputchiki.searchingforgamesforever.online; thesmode@gmail.com)";
        proxy_hide_header  Set-Cookie;
        proxy_ignore_headers Set-Cookie;

        add_header Access-Control-Allow-Origin "*" always;
        add_header X-Cache-Status $upstream_cache_status always;
        expires 30d;
    }

    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 404;
    }
}
