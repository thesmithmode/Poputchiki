# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Unix socket
local   all             all                                     trust

# Localhost (SEC-01: scram-sha-256 как defense-in-depth при RCE в контейнере;
# pg_isready не требует auth, healthcheck работает; init-scripts используют
# unix socket с trust — см. строку 4)
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256

# Docker internal networks
host    all             all             172.16.0.0/12           scram-sha-256

# Replication (только unix socket внутри контейнера + TCP под scram)
local   replication     all                                     trust
host    replication     all             127.0.0.1/32            scram-sha-256
host    replication     all             ::1/128                 scram-sha-256
